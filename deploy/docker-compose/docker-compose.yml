# docker-compose.yml для настройки подъема сервера и nginx

services:
  # Сервис gRPC сервера
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: grpc_server
    ports:
      - "9999:9999"  # Открываем порт для прямого доступа к серверу (опционально)
    networks:
      - app_network
    restart: unless-stopped


# Определение сети для взаимодействия между сервисами
networks:
  app_network:
    driver: bridge