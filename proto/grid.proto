syntax = "proto3";

package grid;

option go_package = "Diplom/gridProto";

message Point2D {
    double x = 1;
    double y = 2;
}

enum BasisType {
    LINEAR = 0;
    QUADRATIC = 1;
}

enum BuildType {
    SEQUENTIAL = 0;
    PARALLEL = 1;
}

enum FormulaType {
    SIMPLE = 0;
    DIFFUR = 1;
}

message Grid2DRequest {
    string formula_x = 1;
    string formula_y = 2;
    Point2D min = 3;
    Point2D max = 4;
    double eps = 5;
    BuildType build_type = 6;
    BasisType basis_type = 7;
    repeated Point2D anchor_points = 8;
    optional double step = 9;
    FormulaType formula_type = 10;
    int32 max_level = 11;
    int64 max_nodes_in_dim = 12;
}

message Grid2D {
    message Index2D {
        uint64 x = 1;
        uint64 y = 2;
    }
    message GridKey2D {
        Index2D index = 1;
        Index2D level = 2;
    }
    message Node2D {
        GridKey2D key = 1;
        Point2D center_unit = 2;
        Point2D alpha = 3;
        bool has_children = 4;
    }

    repeated Node2D nodes = 1;
    repeated Node2D entry_points = 2;
    Point2D min = 3;
    Point2D max = 4;
    BasisType basis_type = 5;
}

service GridService {
    rpc GetGrid2D (Grid2DRequest) returns (Grid2D);
}
